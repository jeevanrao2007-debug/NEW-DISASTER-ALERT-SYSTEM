<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authority Control Panel — Disaster Alert</title>
  <meta name="description" content="Secure authority control panel for managing and broadcasting disaster alerts.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    /* ── ADMIN-PAGE-ONLY STYLES ─────────────────────────────── */

    /* Override body overflow for admin since panel is scrollable */
    body {
      overflow: hidden;
    }

    /* admin map occupies the space right of the panel */
    #map {
      position: absolute;
      top: 64px;
      bottom: 0;
      left: 302px;
      /* panel width + gap */
      right: 0;
      z-index: 1;
      transition: left .3s ease;
    }

    /* ── [UPGRADE] Admin panel — widened for card content ─── */
    .panel {
      width: 286px;
      top: 74px;
      left: 10px;
      max-height: calc(100vh - 84px);
      gap: 8px;
      overflow-y: auto;
    }

    /* ── [UPGRADE] Published badge chip ─────────────────── */
    .badge-pub {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      color: var(--low);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    /* ── [UPGRADE] Publish btn full-width ───────────────── */
    #publishBtn {
      width: 100%;
      margin-top: 2px;
    }

    /* ── [UPGRADE] Broadcast progress bar ──────────────── */
    #broadcastBar {
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 4px;
      width: 0%;
      transition: width .5s ease;
      margin-top: 4px;
    }

    /* ── [UPGRADE] Pending count badge ───────────────────── */
    #pendingCount {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--critical);
      color: white;
      font-size: 10px;
      font-weight: 700;
      margin-left: 5px;
      vertical-align: middle;
      animation: alarm-blink 1.5s step-start infinite;
      display: none;
    }

    /* ── [UPGRADE] Activity stream inside admin panel ─── */
    #adminActivityList {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .activity-item {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: baseline;
      gap: 5px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(30, 41, 59, 0.4);
      animation: activity-in .3s ease;
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    /* ── [UPGRADE] Preview marker pulse ─────────────────── */
    @keyframes preview-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, .6);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
      }
    }

    .preview-marker-icon div {
      animation: preview-pulse 1.4s ease-in-out infinite;
    }
  </style>
</head>

<body style="display:none">

  <!-- ========================================================
     TOP BAR
     ======================================================== -->
  <div class="topbar">

    <div class="topbar-brand">
      <div class="heartbeat-dot" id="heartbeatDot" title="System connected"></div>
      🛡️ Authority Control Panel
    </div>

    <div class="topbar-right">
      <div class="sys-status" id="sysStatus">SECURE SESSION</div>
      <div id="alarmIndicator">
        <div class="ai-blink"></div>
        CRITICAL ACTIVE
      </div>
      <button onclick="logout()"
        style="background:rgba(127,29,29,0.2);border:1px solid rgba(239,68,68,0.3);color:var(--critical);">
        Logout
      </button>
    </div>
  </div>

  <!-- ========================================================
     CONTROL PANEL (LEFT)
     ======================================================== -->
  <div class="panel">

    <!-- Manual Alert Section -->
    <h3>📍 Manual Alert</h3>

    <select id="type">
      <option>Flood</option>
      <option>Fire</option>
      <option>Accident</option>
      <option>Earthquake</option>
      <option>Cyclone</option>
      <option>Landslide</option>
    </select>

    <select id="level">
      <option>Low</option>
      <option>Moderate</option>
      <option>High</option>
      <option>Critical</option>
    </select>

    <input id="desc" placeholder="Short description (optional)">

    <!-- [UPGRADE] Coordinate readout in monospace -->
    <div id="coords">Move mouse over map to pick location</div>

    <!-- [UPGRADE] Named publish button -->
    <button id="publishBtn" onclick="publish()">🚨 Publish Alert</button>

    <!-- [UPGRADE] Broadcast progress bar -->
    <div id="broadcastBar"></div>

    <div id="status"></div>

    <hr style="border-color:var(--border);margin:2px 0;">

    <!-- Pending Alerts Section -->
    <h3>
      ⚠️ Auto-Detected
      <span id="pendingCount"></span>
    </h3>

    <div id="pendingBox">
      <div style="font-size:12px;color:var(--text-dim);padding:6px 0;">No pending alerts</div>
    </div>

    <hr style="border-color:var(--border);margin:2px 0;">

    <!-- [UPGRADE] Activity Log -->
    <h3>📋 Session Log</h3>
    <ul id="adminActivityList">
      <li class="activity-item">
        <div class="ai-dot"></div>
        <span>Session started</span>
      </li>
    </ul>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- [UPGRADE] TOAST CONTAINER -->
  <div id="toastContainer"></div>

  <!-- [UPGRADE] CRITICAL FLASH OVERLAY -->
  <div id="criticalFlash"></div>

  <!-- ========================================================
     MAIN ADMIN MODULE
     ======================================================== -->
  <script type="module" src="src/admin.js"></script>

  <!-- ========================================================
     AUTO-DETECTION MODULE (unchanged logic)
     ======================================================== -->
  <script type="module" src="detected.js"></script>

</body>

</html>
